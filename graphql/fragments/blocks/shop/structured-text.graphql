fragment shopStructuredTextField on ShopStorefrontHeroModelIntroField {
  value
  links {
    ... on PageRecord {
      __typename
      id
      slug
      parent {
        slug
      }
    }
  }
  blocks {
    ... on LinkRecord {
      _modelApiKey
      ...linkBlock
    }
  }
}

