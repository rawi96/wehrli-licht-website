fragment homeStageBlock on HomeStageRecord {
  id
  image {
    responsiveImage(imgixParams: { w: 1920, q: 60, auto: format, fit: crop }) {
      ...responsiveImageFragment
    }
  }
  slideshowImages: images {
    id
    responsiveImage(imgixParams: { w: 1920, q: 60, auto: format, fit: crop }) {
      ...responsiveImageFragment
    }
  }
  title
  intro
  callToActions {
    ...linkBlock
  }
}
